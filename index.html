<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Identity ─────────────────────────────────────────────── -->
    <title>HomeCare</title>
    <meta name="description" content="Vos rappels santé et soins à domicile – médicaments, agenda, sécurité." />
    <meta name="robots" content="noindex, nofollow" />

    <!-- ── PWA / Theme ──────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00C8FF" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="HomeCare" />

    <!-- ── Apple / iOS ──────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HomeCare" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- ── Icons ────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />

    <!-- ── Open Graph ───────────────────────────────────────────── -->
    <meta property="og:title" content="HomeCare" />
    <meta property="og:description" content="Vos rappels santé et soins à domicile." />
    <meta property="og:type" content="website" />

    <!-- ── Base Styles ──────────────────────────────────────────── -->
    <style>
      html, body { height: 100%; margin: 0; }
      #root { height: 100%; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
